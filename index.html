<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Escala">
<meta name="theme-color" content="#0f0f1a">
<title>Escala de Trabalho</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f1a;--surface:#1a1a2e;--card:#222238;--border:#2e2e4a;
  --text:#f0f0ff;--muted:#888aaa;--accent:#4f8ef7;
  --p24:#34c97e;--p24bg:#0a3320;--p24bd:#1a6640;
  --folga:#f4a93a;--folgabg:#3a2200;--folgabd:#7a4800;
  --radius:12px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;min-height:100dvh}

.header{padding:env(safe-area-inset-top,44px) 20px 14px;background:var(--surface);border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.app-title{font-size:20px;font-weight:600;letter-spacing:-0.3px}
.regime-badge{font-size:11px;color:var(--p24);background:var(--p24bg);padding:3px 10px;border-radius:20px;border:1px solid var(--p24bd)}
.resumo{font-size:12px;color:var(--muted)}
.resumo b{color:var(--text);font-weight:500}

.month-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 8px;background:var(--surface)}
.month-label{font-size:17px;font-weight:600;letter-spacing:-0.3px}
.nav-btn{background:var(--card);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.nav-btn:active{opacity:.6}

.weekdays{display:grid;grid-template-columns:repeat(7,1fr);padding:0 12px 6px;background:var(--surface)}
.wd{text-align:center;font-size:11px;color:var(--muted);font-weight:500;padding:4px 0}

.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:6px 12px 14px;background:var(--surface)}
.day{border-radius:10px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1.5px solid transparent;background:var(--card);position:relative}
.day.empty{background:transparent;border:none}
.day-num{font-size:14px;font-weight:400;line-height:1}
.day-lbl{font-size:8px;font-weight:600;margin-top:2px;line-height:1}
.day.livre .day-num{color:#444466}
.day.plantao-24h{background:var(--p24bg);border-color:var(--p24bd)}
.day.plantao-24h .day-num{color:var(--p24)}
.day.plantao-24h .day-lbl{color:var(--p24)}
.day.folga{background:var(--folgabg);border-color:var(--folgabd)}
.day.folga .day-num{color:var(--folga)}
.day.folga .day-lbl{color:var(--folga)}
.day.hoje{border-color:var(--accent)!important}
.day.hoje .day-num{color:var(--accent);font-weight:700}

.legend{display:flex;gap:14px;justify-content:center;padding:10px 16px;background:var(--surface);border-top:1px solid var(--border)}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.leg-dot{width:10px;height:10px;border-radius:3px}

.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px}
.sum-card{background:var(--card);border-radius:var(--radius);padding:12px 8px;text-align:center;border:1px solid var(--border)}
.sum-num{font-size:22px;font-weight:600}
.sum-lbl{font-size:9px;color:var(--muted);margin-top:3px;line-height:1.3}
.sum-card.c24 .sum-num{color:var(--p24)}
.sum-card.cfg .sum-num{color:var(--folga)}

.config-section{padding:0 12px 12px}
.config-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px}
.config-title{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px}
.config-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.config-row:last-child{margin-bottom:0}
.config-label{font-size:13px;color:var(--text)}
.config-val{font-size:13px;color:var(--p24);font-weight:500}
.config-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:6px 10px;width:140px;text-align:right}
.config-input:focus{outline:none;border-color:var(--accent)}
.btn-aplicar{width:100%;margin-top:12px;background:var(--p24bg);border:1px solid var(--p24bd);color:var(--p24);border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer}
.btn-aplicar:active{opacity:.7}

.safe-bottom{height:env(safe-area-inset-bottom,20px);background:var(--bg)}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="app-title">📋 Escala</span>
    <span class="regime-badge">2 dias × 6 folgas · 24h</span>
  </div>
  <div class="resumo" id="resumo"></div>
</div>

<div class="month-nav">
  <button class="nav-btn" onclick="mudarMes(-1)">‹</button>
  <span class="month-label" id="mes-label"></span>
  <button class="nav-btn" onclick="mudarMes(1)">›</button>
</div>

<div class="weekdays">
  <div class="wd">Dom</div><div class="wd">Seg</div><div class="wd">Ter</div>
  <div class="wd">Qua</div><div class="wd">Qui</div><div class="wd">Sex</div><div class="wd">Sáb</div>
</div>

<div class="calendar" id="calendar"></div>

<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:var(--p24)"></div>Plantão 24h</div>
  <div class="leg"><div class="leg-dot" style="background:var(--folga)"></div>Folga</div>
  <div class="leg"><div class="leg-dot" style="background:var(--accent)"></div>Hoje</div>
</div>

<div class="summary">
  <div class="sum-card c24"><div class="sum-num" id="cnt-24">0</div><div class="sum-lbl">Plantões no mês</div></div>
  <div class="sum-card cfg"><div class="sum-num" id="cnt-fg">0</div><div class="sum-lbl">Folgas no mês</div></div>
  <div class="sum-card"><div class="sum-num" id="cnt-hr">0</div><div class="sum-lbl">Horas no mês</div></div>
</div>

<div class="config-section">
  <div class="config-card">
    <div class="config-title">⚙️ Configurar escala</div>
    <div class="config-row">
      <span class="config-label">Primeiro dia de trabalho</span>
    </div>
    <div class="config-row">
      <input type="date" class="config-input" id="data-inicio" />
    </div>
    <div class="config-row">
      <span class="config-label">Dias trabalhando</span>
      <input type="number" class="config-input" id="dias-trabalho" value="2" min="1" max="7" style="width:70px;text-align:center">
    </div>
    <div class="config-row">
      <span class="config-label">Dias de folga</span>
      <input type="number" class="config-input" id="dias-folga" value="6" min="1" max="14" style="width:70px;text-align:center">
    </div>
    <button class="btn-aplicar" onclick="aplicarEscala()">✓ Gerar escala automaticamente</button>
  </div>
</div>

<div class="safe-bottom"></div>

<script>
const meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
let hoje=new Date(),anoAtual=hoje.getFullYear(),mesAtual=hoje.getMonth();

// Configuração padrão: começa 28/06/2026, 2 trabalho + 6 folga
let config = JSON.parse(localStorage.getItem('escala-config') || 'null') || {
  inicio: '2026-06-28',
  trabalho: 2,
  folga: 6
};

function salvarConfig(){localStorage.setItem('escala-config', JSON.stringify(config))}

function tipoDodia(ano, mes, dia){
  if(!config.inicio) return 'livre';
  const base = new Date(config.inicio + 'T00:00:00');
  const alvo = new Date(ano, mes, dia);
  const diff = Math.round((alvo - base) / 86400000);
  if(diff < 0){
    // antes do início: calcular retroativamente
    const ciclo = config.trabalho + config.folga;
    let pos = ((diff % ciclo) + ciclo) % ciclo;
    return pos < config.trabalho ? 'plantao-24h' : 'folga';
  }
  const ciclo = config.trabalho + config.folga;
  const pos = diff % ciclo;
  return pos < config.trabalho ? 'plantao-24h' : 'folga';
}

function mudarMes(d){
  mesAtual+=d;
  if(mesAtual>11){mesAtual=0;anoAtual++}
  if(mesAtual<0){mesAtual=11;anoAtual--}
  render();
}

function aplicarEscala(){
  const dataVal = document.getElementById('data-inicio').value;
  const trab = parseInt(document.getElementById('dias-trabalho').value)||2;
  const folg = parseInt(document.getElementById('dias-folga').value)||6;
  if(!dataVal){alert('Escolha a data de início');return}
  config = {inicio: dataVal, trabalho: trab, folga: folg};
  salvarConfig();
  render();
}

function render(){
  // preencher inputs com config atual
  document.getElementById('data-inicio').value = config.inicio||'';
  document.getElementById('dias-trabalho').value = config.trabalho;
  document.getElementById('dias-folga').value = config.folga;

  document.getElementById('mes-label').textContent=`${meses[mesAtual]} ${anoAtual}`;
  const inicio=new Date(anoAtual,mesAtual,1).getDay();
  const total=new Date(anoAtual,mesAtual+1,0).getDate();
  const cal=document.getElementById('calendar');
  cal.innerHTML='';
  let c24=0,cfg=0;

  for(let i=0;i<inicio;i++){
    const e=document.createElement('div');e.className='day empty';cal.appendChild(e);
  }
  for(let d=1;d<=total;d++){
    const tipo=tipoDodia(anoAtual,mesAtual,d);
    const el=document.createElement('div');
    let cls='day '+tipo;
    if(hoje.getFullYear()===anoAtual&&hoje.getMonth()===mesAtual&&hoje.getDate()===d) cls+=' hoje';
    el.className=cls;
    const lbls={'plantao-24h':'24h','folga':'Folga','livre':''};
    el.innerHTML=`<span class="day-num">${d}</span>${tipo!=='livre'?`<span class="day-lbl">${lbls[tipo]||''}</span>`:''}`;
    cal.appendChild(el);
    if(tipo==='plantao-24h')c24++;
    if(tipo==='folga')cfg++;
  }

  document.getElementById('cnt-24').textContent=c24;
  document.getElementById('cnt-fg').textContent=cfg;
  document.getElementById('cnt-hr').textContent=c24*24;
  document.getElementById('resumo').innerHTML=`<b>${c24} plantão${c24!==1?'ões':''}</b> · <b>${cfg} folga${cfg!==1?'s':''}</b> · <b>${c24*24}h</b> em ${meses[mesAtual]}`;
}

render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Escala">
<meta name="theme-color" content="#1a1a2e">
<title>Escala de Trabalho</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0f0f1a;
    --surface:#1a1a2e;
    --card:#222238;
    --border:#2e2e4a;
    --text:#f0f0ff;
    --muted:#888aaa;
    --accent:#4f8ef7;
    --p12:#4f8ef7;
    --p12bg:#0d2a5e;
    --p12border:#1a4a9e;
    --p24:#34c97e;
    --p24bg:#0a3320;
    --p24border:#1a6640;
    --folga:#f4a93a;
    --folgabg:#3a2200;
    --folgaborder:#7a4800;
    --radius:12px;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;overscroll-behavior:none}
  body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh}

  /* Header */
  .header{padding:env(safe-area-inset-top,20px) 20px 14px;background:var(--surface);border-bottom:1px solid var(--border)}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .app-title{font-size:20px;font-weight:600;letter-spacing:-0.3px}
  .mes-badge{font-size:12px;color:var(--muted);background:var(--card);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}
  .resumo{font-size:12px;color:var(--muted)}
  .resumo span{color:var(--text);font-weight:500}

  /* Month nav */
  .month-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 8px;background:var(--surface)}
  .month-label{font-size:17px;font-weight:600;letter-spacing:-0.3px}
  .nav-btn{background:var(--card);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .15s}
  .nav-btn:active{opacity:.6}

  /* Weekdays */
  .weekdays{display:grid;grid-template-columns:repeat(7,1fr);padding:0 12px 6px;background:var(--surface)}
  .wd{text-align:center;font-size:11px;color:var(--muted);font-weight:500;padding:4px 0}

  /* Calendar */
  .calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:6px 12px 12px;background:var(--surface);flex:0 0 auto}
  .day{border-radius:10px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1.5px solid transparent;transition:all .15s;position:relative;background:var(--card)}
  .day:active{transform:scale(0.9)}
  .day.empty{background:transparent;cursor:default;border:none}
  .day-num{font-size:14px;font-weight:400;line-height:1}
  .day-lbl{font-size:8px;font-weight:600;margin-top:2px;line-height:1;letter-spacing:0.2px}
  .day.livre .day-num{color:var(--text)}
  .day.livre .day-lbl{display:none}
  .day.hoje{border-color:var(--accent)!important}
  .day.hoje .day-num{color:var(--accent);font-weight:600}
  .day.plantao-12h{background:var(--p12bg);border-color:var(--p12border)}
  .day.plantao-12h .day-num{color:var(--p12)}
  .day.plantao-12h .day-lbl{color:var(--p12)}
  .day.plantao-24h{background:var(--p24bg);border-color:var(--p24border)}
  .day.plantao-24h .day-num{color:var(--p24)}
  .day.plantao-24h .day-lbl{color:var(--p24)}
  .day.folga{background:var(--folgabg);border-color:var(--folgaborder)}
  .day.folga .day-num{color:var(--folga)}
  .day.folga .day-lbl{color:var(--folga)}

  /* Legend */
  .legend{display:flex;gap:12px;justify-content:center;padding:8px 16px;background:var(--surface);border-top:1px solid var(--border)}
  .leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
  .leg-dot{width:10px;height:10px;border-radius:3px}

  /* Summary cards */
  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px;background:var(--bg)}
  .sum-card{background:var(--card);border-radius:var(--radius);padding:10px 8px;text-align:center;border:1px solid var(--border)}
  .sum-num{font-size:20px;font-weight:600}
  .sum-lbl{font-size:9px;color:var(--muted);margin-top:2px;line-height:1.3}
  .sum-card.c12 .sum-num{color:var(--p12)}
  .sum-card.c24 .sum-num{color:var(--p24)}
  .sum-card.cfg .sum-num{color:var(--folga)}

  /* Mode bar */
  .mode-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 12px 12px;background:var(--bg)}
  .mode-btn{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 4px 10px;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:4px}
  .mode-btn svg{width:20px;height:20px;stroke-width:1.8;stroke:currentColor;fill:none}
  .mode-btn:active{transform:scale(0.94)}
  .mode-btn.sel-12{background:var(--p12bg);border-color:var(--p12);color:var(--p12)}
  .mode-btn.sel-24{background:var(--p24bg);border-color:var(--p24);color:var(--p24)}
  .mode-btn.sel-fg{background:var(--folgabg);border-color:var(--folga);color:var(--folga)}
  .mode-btn.sel-cl{background:#2a0a0a;border-color:#cc3333;color:#ff6666}

  /* Hint */
  .hint{text-align:center;font-size:11px;color:var(--muted);padding:0 16px 8px;background:var(--bg)}

  /* Bottom safe area */
  .safe-bottom{height:env(safe-area-inset-bottom,0);background:var(--bg)}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="app-title">📋 Escala</span>
    <span class="mes-badge" id="mes-badge"></span>
  </div>
  <div class="resumo" id="resumo"></div>
</div>

<div class="month-nav">
  <button class="nav-btn" onclick="mudarMes(-1)">‹</button>
  <span class="month-label" id="mes-label"></span>
  <button class="nav-btn" onclick="mudarMes(1)">›</button>
</div>

<div class="weekdays">
  <div class="wd">Dom</div><div class="wd">Seg</div><div class="wd">Ter</div>
  <div class="wd">Qua</div><div class="wd">Qui</div><div class="wd">Sex</div><div class="wd">Sáb</div>
</div>

<div class="calendar" id="calendar"></div>

<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:var(--p12)"></div>Plantão 12h</div>
  <div class="leg"><div class="leg-dot" style="background:var(--p24)"></div>Plantão 24h</div>
  <div class="leg"><div class="leg-dot" style="background:var(--folga)"></div>Folga</div>
</div>

<div class="summary">
  <div class="sum-card c12"><div class="sum-num" id="cnt-12">0</div><div class="sum-lbl">Plantão 12h</div></div>
  <div class="sum-card c24"><div class="sum-num" id="cnt-24">0</div><div class="sum-lbl">Plantão 24h</div></div>
  <div class="sum-card cfg"><div class="sum-num" id="cnt-fg">0</div><div class="sum-lbl">Folgas</div></div>
  <div class="sum-card"><div class="sum-num" id="cnt-hr">0</div><div class="sum-lbl">Horas no mês</div></div>
</div>

<div class="mode-bar">
  <button class="mode-btn" id="btn-12" onclick="setModo('plantao-12h')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    12h
  </button>
  <button class="mode-btn" id="btn-24" onclick="setModo('plantao-24h')">
    <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    24h
  </button>
  <button class="mode-btn" id="btn-fg" onclick="setModo('folga')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    Folga
  </button>
  <button class="mode-btn" id="btn-cl" onclick="setModo('limpar')">
    <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    Limpar
  </button>
</div>

<div class="hint" id="hint">Escolha um modo e toque nos dias</div>
<div class="safe-bottom"></div>

<script>
const meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
let hoje=new Date(),anoAtual=hoje.getFullYear(),mesAtual=hoje.getMonth(),modo=null;
let dados=JSON.parse(localStorage.getItem('escala')||'{}');

function salvar(){localStorage.setItem('escala',JSON.stringify(dados))}
function chave(a,m,d){return`${a}-${m}-${d}`}

function mudarMes(d){
  mesAtual+=d;
  if(mesAtual>11){mesAtual=0;anoAtual++}
  if(mesAtual<0){mesAtual=11;anoAtual--}
  render();
}

function setModo(m){
  modo=modo===m?null:m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.className='mode-btn');
  const map={'plantao-12h':['btn-12','sel-12','Tocando nos dias → Plantão 12h'],
             'plantao-24h':['btn-24','sel-24','Tocando nos dias → Plantão 24h'],
             'folga':['btn-fg','sel-fg','Tocando nos dias → Folga'],
             'limpar':['btn-cl','sel-cl','Tocando nos dias → Remove marcação']};
  if(modo&&map[modo]){
    document.getElementById(map[modo][0]).classList.add(map[modo][1]);
    document.getElementById('hint').textContent=map[modo][2];
  } else {
    document.getElementById('hint').textContent='Escolha um modo e toque nos dias';
  }
}

function clicarDia(a,m,d){
  if(!modo)return;
  const k=chave(a,m,d);
  if(modo==='limpar') delete dados[k]; else dados[k]=modo;
  salvar(); render();
}

function render(){
  document.getElementById('mes-label').textContent=`${meses[mesAtual]} ${anoAtual}`;
  document.getElementById('mes-badge').textContent=meses[mesAtual].substring(0,3)+' '+anoAtual;
  const inicio=new Date(anoAtual,mesAtual,1).getDay();
  const total=new Date(anoAtual,mesAtual+1,0).getDate();
  const cal=document.getElementById('calendar');
  cal.innerHTML='';
  let c12=0,c24=0,cfg=0;
  for(let i=0;i<inicio;i++){
    const e=document.createElement('div');e.className='day empty';cal.appendChild(e);
  }
  for(let d=1;d<=total;d++){
    const k=chave(anoAtual,mesAtual,d);
    const tipo=dados[k]||'livre';
    const el=document.createElement('div');
    let cls='day '+tipo;
    if(hoje.getFullYear()===anoAtual&&hoje.getMonth()===mesAtual&&hoje.getDate()===d) cls+=' hoje';
    el.className=cls;
    const lbls={'plantao-12h':'12h','plantao-24h':'24h','folga':'Folga','livre':''};
    el.innerHTML=`<span class="day-num">${d}</span>${tipo!=='livre'?`<span class="day-lbl">${lbls[tipo]}</span>`:''}`;
    el.addEventListener('click',()=>clicarDia(anoAtual,mesAtual,d));
    cal.appendChild(el);
    if(tipo==='plantao-12h')c12++;
    if(tipo==='plantao-24h')c24++;
    if(tipo==='folga')cfg++;
  }
  document.getElementById('cnt-12').textContent=c12;
  document.getElementById('cnt-24').textContent=c24;
  document.getElementById('cnt-fg').textContent=cfg;
  document.getElementById('cnt-hr').textContent=(c12*12)+(c24*24);
  const t=c12+c24;
  document.getElementById('resumo').innerHTML=`<span>${t} plantão${t!==1?'ões':''}</span> · <span>${cfg} folga${cfg!==1?'s':''}</span> · <span>${(c12*12)+(c24*24)}h trabalhadas</span>`;
}

render();
</script>
</body>
</html>
